<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>MindMesh SuperAdmin</title>

<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="/static/favicon.png">

</head>

<body>

<div class="container">

<div class="card">

<h1>🧠 SearchWave Control Center</h1>
<p style="opacity:0.7;">MindMesh — начало</p>

<hr>

<!-- ===================================================== -->
<!-- SYSTEM STATUS MODULE                                  -->
<!-- ===================================================== -->

<h3>System Status</h3>

<p>
<b>Test Mode:</b>
<span id="testModeStatus">Loading...</span>
</p>

<p>
<b>Maintenance:</b>
<span id="maintenanceStatus">Loading...</span>
</p>

<hr>

<!-- ===================================================== -->
<!-- SYSTEM CONTROLS MODULE                                -->
<!-- ===================================================== -->

<h3>System Controls</h3>

<div class="buttons">

<button class="btn small" onclick="toggleTest()">
Toggle Test Mode
</button>

<button class="btn small secondary" onclick="setSoft()">
Soft Maintenance
</button>

<button class="btn small secondary" onclick="setFull()">
Full Maintenance
</button>

<button class="btn small" onclick="disableMaint()">
Disable Maintenance
</button>

</div>

<hr>

<!-- ===================================================== -->
<!-- USER CONTROL MODULE                                   -->
<!-- ===================================================== -->

<h3>Users</h3>

<div id="users">
Loading users...
</div>

<hr>

<!-- ===================================================== -->
<!-- SYSTEM LOG                                            -->
<!-- ===================================================== -->

<h3>System Log</h3>

<div class="log" id="system-log">
Loading log...
</div>

<hr>

<!-- ===================================================== -->
<!-- FUTURE MODULES                                        -->
<!-- ===================================================== -->

<h3>AI Control</h3>
<p style="opacity:0.7;">
Similarity threshold, AI review mode, reindex (v2).
</p>

</div>

</div>

<script src="/static/js/system_workdesk.js"></script>

</body>
</html>
